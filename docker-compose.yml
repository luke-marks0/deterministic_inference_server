# Generic fallback compose template.
services:
  vllm:
    image: ${VLLM_IMAGE}
    container_name: ${CONTAINER_NAME:-vllm_server}
    gpus: ${GPUS:-all}
    ipc: ${IPC_MODE:-host}
    restart: ${RESTART_POLICY:-unless-stopped}
    ulimits:
      memlock: ${MEMLOCK_LIMIT:--1}
      stack: ${STACK_LIMIT:-67108864}
    ports:
      - "${VLLM_PORT:-8000}:${VLLM_CONTAINER_PORT:-8000}"
    volumes:
      - ./state/hf:/data/hf
      - ./artifacts:/artifacts
      - ./scripts/launch-vllm.sh:/opt/deterministic/launch-vllm.sh:ro
    entrypoint:
      - /bin/sh
      - /opt/deterministic/launch-vllm.sh
    environment:
      MODEL_ID: ${MODEL_ID}
      MODEL_REVISION: ${MODEL_REVISION}
      SERVED_MODEL_NAME: ${SERVED_MODEL_NAME}
      VLLM_DTYPE: "${VLLM_DTYPE:-auto}"
      VLLM_TENSOR_PARALLEL_SIZE: "${VLLM_TENSOR_PARALLEL_SIZE:-1}"
      VLLM_PIPELINE_PARALLEL_SIZE: "${VLLM_PIPELINE_PARALLEL_SIZE:-1}"
      VLLM_MAX_MODEL_LEN: "${VLLM_MAX_MODEL_LEN:-32768}"
      VLLM_MAX_NUM_SEQS: "${VLLM_MAX_NUM_SEQS:-1}"
      VLLM_MAX_NUM_BATCHED_TOKENS: "${VLLM_MAX_NUM_BATCHED_TOKENS:-8192}"
      VLLM_HOST: "${VLLM_HOST:-0.0.0.0}"
      VLLM_CONTAINER_PORT: "${VLLM_CONTAINER_PORT:-8000}"
      HF_HOME: ${HF_HOME:-/data/hf}
      HUGGING_FACE_HUB_TOKEN: ${HUGGING_FACE_HUB_TOKEN}
      PYTHONHASHSEED: "${PYTHONHASHSEED:-0}"
      OMP_NUM_THREADS: "${OMP_NUM_THREADS:-1}"
      MKL_NUM_THREADS: "${MKL_NUM_THREADS:-1}"
      CUDA_DEVICE_ORDER: "${CUDA_DEVICE_ORDER:-PCI_BUS_ID}"
      CUDA_VISIBLE_DEVICES: "${CUDA_VISIBLE_DEVICES:-0}"
      CUDA_DEVICE_MAX_CONNECTIONS: "${CUDA_DEVICE_MAX_CONNECTIONS:-1}"
      CUBLAS_WORKSPACE_CONFIG: "${CUBLAS_WORKSPACE_CONFIG:-:4096:8}"
      VLLM_BATCH_INVARIANT: "${VLLM_BATCH_INVARIANT:-1}"
      VLLM_ENABLE_V1_MULTIPROCESSING: "${VLLM_ENABLE_V1_MULTIPROCESSING:-0}"
      VLLM_ATTENTION_BACKEND: "${VLLM_ATTENTION_BACKEND:-FLASH_ATTN}"
      VLLM_TRUST_REMOTE_CODE: "${VLLM_TRUST_REMOTE_CODE:-0}"
      VLLM_ENABLE_AUTO_TOOL_CHOICE: "${VLLM_ENABLE_AUTO_TOOL_CHOICE:-0}"
      VLLM_GPU_MEMORY_UTILIZATION: "${VLLM_GPU_MEMORY_UTILIZATION:-}"
      VLLM_QUANTIZATION: "${VLLM_QUANTIZATION:-}"
      VLLM_TOOL_CALL_PARSER: "${VLLM_TOOL_CALL_PARSER:-}"
      VLLM_REASONING_PARSER: "${VLLM_REASONING_PARSER:-}"
      LANG: ${LANG:-C.UTF-8}
      LC_ALL: ${LC_ALL:-C.UTF-8}
      TZ: ${TZ:-UTC}
